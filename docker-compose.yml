version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_tp
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokemon_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n
    container_name: n8n_tp
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgres
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=pokemon_db
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=https://nonpursuant-nondistortedly-helaine.ngrok-free.dev
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      - postgres

  minio:
    image: minio/minio
    container_name: minio_tp
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  metabase:
    image: metabase/metabase
    container_name: metabase_tp
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - postgres

volumes:
  pgdata:
  n8ndata:
  minio_data:
  metabase_data: